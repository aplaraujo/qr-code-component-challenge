<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend Mentor | QR code component</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="/images/favicon-32x32.png" type="image/x-icon">
</head>

<body>
    <section class="card">
        <div class="card__image">
            <img src="https://raw.githubusercontent.com/aplaraujo/qr-code-component-challenge/refs/heads/main/images/image-qr-code.png" alt="QR Code">
        </div>
        <div class="card__content">
            <h2 class="card__content-title">Improve your front-end skills by building projects</h2>
            <p class="card__content-text">Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</p>
        </div>
    </section>
</body>

</html>
